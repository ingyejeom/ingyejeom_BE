<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>그룹 관리</title>
    <script src="https://code.jquery.com/jquery-3.7.1.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/startbootstrap-sb-admin-2/4.1.4/css/sb-admin-2.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fc; padding: 40px; }
        .container { max-width: 800px; margin: 0 auto; }

        .header-area { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .page-title { font-size: 24px; font-weight: bold; color: #5a5c69; }

        .btn-group-area { display: flex; gap: 10px; }
        .btn-add-work { background-color: white; border: 1px solid #4e73df; color: #4e73df; padding: 8px 16px; border-radius: 4px; cursor: pointer; transition: all 0.2s; }
        .btn-add-work:hover { background-color: #4e73df; color: white; }

        .btn-delete-group { background-color: white; border: 1px solid #e74a3b; color: #e74a3b; padding: 8px 16px; border-radius: 4px; cursor: pointer; transition: all 0.2s; }
        .btn-delete-group:hover { background-color: #e74a3b; color: white; }

        .list-area { display: flex; flex-direction: column; gap: 15px; }
        .space-item { background: white; border: 1px solid #e3e6f0; border-radius: 5px; padding: 20px; display: flex; justify-content: space-between; align-items: center; }

        .info-box div { margin-bottom: 3px; }
        .txt-title { font-size: 18px; font-weight: bold; color: #333; }
        .txt-sub { font-size: 14px; color: #888; }

        .btn-area { display: flex; gap: 10px; }
        .btn-enter { background-color: #858796; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; }
        .btn-handover { background-color: #d1d3e2; color: #333; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="mb-3">
        <a href="/user/profile" class="btn btn-light btn-sm">← 내 프로필로</a>
    </div>

    <div class="header-area">
        <div class="page-title">스페이스 목록</div>

        <div class="btn-group-area">
            <button class="btn-add-work" onclick="addWork()">업무 추가</button>
            <button class="btn-delete-group" onclick="deleteGroup()">그룹 삭제</button>
        </div>
    </div>

    <div id="space_list_area" class="list-area">
    </div>
</div>

<script>
    // URL에서 groupId 추출
    const pathParts = location.pathname.split('/');
    const groupId = pathParts[pathParts.length - 1];

    // --- 무한 스크롤 제어를 위한 전역 상태 변수 ---
    let currentCursor = null; // 다음 데이터를 가져오기 위한 기준 ID
    let isFetching = false;   // 중복 API 호출 방지용 플래그
    let hasMoreData = true;   // 서버에 남은 데이터가 있는지 여부
    const PER_PAGE = 10;      // 한 번에 가져올 데이터 개수

    $(document).ready(function(){
        let accessToken = localStorage.getItem("accessToken");
        if(accessToken){
            $.ajaxSetup({
                beforeSend: function(xhr){
                    if (!accessToken.startsWith("Bearer ")) accessToken = "Bearer " + accessToken;
                    xhr.setRequestHeader("Authorization", accessToken);
                }
            });
        }

        // 1. 화면 진입 시 초기 데이터 10개 로드
        loadGroupSpaces(true);

        // 2. 스크롤 이벤트 감지
        $(window).scroll(function() {
            // 스크롤이 바닥에서 100px 정도 남았을 때 감지
            if ($(window).scrollTop() + $(window).height() >= $(document).height() - 100) {
                // 더 가져올 데이터가 있고, 통신 중이 아닐 때만 다음 페이지 요청
                if (hasMoreData && !isFetching) {
                    loadGroupSpaces(false);
                }
            }
        });
    });

    // 1. 그룹 내 스페이스 목록 조회 (isInitialLoad: 첫 로드인지 여부)
    function loadGroupSpaces(isInitialLoad = false){
        if (isFetching) return;
        isFetching = true;

        let listArea = $("#space_list_area");

        // 초기화 로드일 경우 상태 변수와 화면을 모두 비움
        if (isInitialLoad) {
            currentCursor = null;
            hasMoreData = true;
            listArea.empty();
        }

        $.ajax({
            url: '/api/userSpace/getAdminSpaces',
            method: 'GET',
            data: {
                groupId: groupId,
                cursor: currentCursor, // 직전 마지막 데이터의 ID 전송 (처음엔 null)
                perPage: PER_PAGE,
                orderWay: 'desc'       // 최신 생성순
            },
            success: function(data){
                // 첫 진입 시 데이터가 아예 없는 경우
                if(isInitialLoad && (!data || data.length === 0)){
                    listArea.html("<div class='text-center p-4'>스페이스가 없습니다.</div>");
                    hasMoreData = false;
                    isFetching = false;
                    return;
                }

                // 가져온 데이터가 요청한 perPage(10개)보다 적다면, 다음 데이터는 없음
                if(!data || data.length < PER_PAGE) {
                    hasMoreData = false;
                }

                // 데이터 렌더링
                $.each(data, function(index, item){
                    let groupName = item.groupName || "그룹없음";
                    let workName = item.workName || "업무없음";
                    let spaceCode = item.spaceCode || "코드없음";
                    let createdAt = item.createdAt ? item.createdAt.split('T')[0] : "-";
                    let userName = item.userName || "미배정";

                    let html = `
                        <div class="space-item">
                            <div class="info-box">
                                <div class="txt-title">${groupName} ${workName}</div>
                                <div class="txt-sub">${spaceCode}</div>
                                <div class="txt-sub">생성일: ${createdAt}</div>
                                <div class="txt-sub">담당자: ${userName}</div>
                            </div>
                            <div class="btn-area">
                                <button class="btn-enter" onclick="location.href='/space/detail/${item.spaceId}'">입장</button>
                                <button class="btn-handover" onclick="requestHandover(${item.spaceId})">인계</button>
                            </div>
                        </div>
                    `;
                    listArea.append(html);

                    // 핵심: 방금 그린 마지막 요소의 식별자(id)를 다음 커서로 업데이트
                    currentCursor = item.id;
                });

                isFetching = false;
            },
            error: function(){
                alert("목록을 불러오지 못했습니다.");
                isFetching = false;
            }
        });
    }

    // 2. 업무 추가 기능
    function addWork() {
        let workName = prompt("추가할 업무명을 입력하세요:");
        if (!workName || workName.trim() === "") return;

        let userEmail = prompt("담당자 이메일을 입력하세요 (선택):");

        let _data = {
            groupId: groupId,
            workName: workName.trim(),
            userEmail: userEmail ? userEmail.trim() : ""
        };

        $.ajax({
            url: '/api/space',
            method: 'POST',
            contentType: 'application/json',
            data: JSON.stringify(_data),
            success: function() {
                alert("업무가 추가되었습니다.");
                // 새 업무가 상단에 보이도록 목록을 싹 지우고 처음부터 다시 로드
                loadGroupSpaces(true);
            },
            error: function(err) {
                let msg = "업무 추가에 실패했습니다.";
                if(err.responseJSON && err.responseJSON.message) msg = err.responseJSON.message;
                alert(msg);
            }
        });
    }

    // 3. 인계하기 기능
    function requestHandover(spaceId){
        let email = prompt("업무를 인계할 사용자의 이메일을 입력하세요:");
        if(!email) return;

        $.ajax({
            url: '/api/userSpace/invite',
            method: 'POST',
            contentType: 'application/json',
            data: JSON.stringify({ spaceId: spaceId, email: email.trim() }),
            success: function() { alert("인계(초대) 완료!"); },
            error: function(err) {
                let msg = err.responseJSON && err.responseJSON.message ? err.responseJSON.message : "실패했습니다.";
                alert(msg);
            }
        });
    }

    // 4. 그룹 삭제 기능 구현
    function deleteGroup() {
        if (!confirm("정말 이 그룹을 삭제하시겠습니까?\\n그룹에 포함된 모든 업무(스페이스)도 함께 삭제됩니다.")) {
            return;
        }

        let _data = { id: groupId };

        $.ajax({
            url: '/api/group',
            method: 'DELETE',
            contentType: 'application/json',
            data: JSON.stringify(_data),
            success: function() {
                alert("그룹과 소속된 모든 업무가 삭제되었습니다.");
                location.href = "/user/profile";
            },
            error: function(err) {
                alert("그룹 삭제에 실패했습니다.");
            }
        });
    }
</script>

</body>
</html>
