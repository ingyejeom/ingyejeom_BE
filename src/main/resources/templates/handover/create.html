<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>인수인계서 생성</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
        /* ========================================
           기본 스타일
           ======================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #f5f5f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        /* ========================================
           폼 컨테이너
           ======================================== */
        .form-container {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
        }

        .form-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .form-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .form-title {
            font-size: 24px;
            font-weight: 700;
            color: #333;
            margin-bottom: 8px;
        }

        .form-subtitle {
            font-size: 14px;
            color: #666;
        }

        /* ========================================
           폼 필드
           ======================================== */
        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }

        .form-control {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
            transition: border-color 0.2s;
        }

        .form-control:focus {
            outline: none;
            border-color: #007bff;
        }

        .form-hint {
            font-size: 12px;
            color: #888;
            margin-top: 5px;
        }

        /* ========================================
           버튼
           ======================================== */
        .form-actions {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }

        .btn {
            flex: 1;
            padding: 14px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #007bff;
            color: white;
        }

        .btn-primary:hover {
            background: #0056b3;
        }

        .btn-secondary {
            background: #e9ecef;
            color: #333;
        }

        .btn-secondary:hover {
            background: #dee2e6;
        }
    </style>
</head>
<body>

<!-- ========================================
     폼 컨테이너
     ======================================== -->
<div class="form-container">
    <div class="form-header">
        <div class="form-icon">📄</div>
        <h1 class="form-title">새 인수인계서 생성</h1>
        <p class="form-subtitle">인수인계 문서의 기본 정보를 입력하세요</p>
    </div>

    <form id="createForm">
        <div class="form-group">
            <label class="form-label" for="role">역할명 *</label>
            <input type="text" class="form-control" id="role" placeholder="예: 총무, 회장, 홍보팀장" required>
            <p class="form-hint">인수인계를 받을 직책/역할을 입력하세요</p>
        </div>

        <div class="form-group">
            <label class="form-label" for="title">인수인계서 제목</label>
            <input type="text" class="form-control" id="title" placeholder="자동 생성: [역할명] 인수인계서">
            <p class="form-hint">비워두면 "[역할명] 인수인계서" 형식으로 자동 생성됩니다</p>
        </div>

        <div class="form-actions">
            <button type="button" class="btn btn-secondary" onclick="goBack()">취소</button>
            <button type="submit" class="btn btn-primary">생성하기</button>
        </div>
    </form>
</div>

<script>
/**
 * ========================================
 * 전역 변수
 * ========================================
 */

// UserSpace ID (URL에서 추출)
let userSpaceId = null;

/**
 * ========================================
 * 초기화 함수
 * ========================================
 */

/**
 * 페이지 로드 시 초기화
 */
$(document).ready(function() {
    // URL에서 userSpaceId 추출
    // /handover/create/{userSpaceId} 또는 쿼리 파라미터로 전달
    const pathParts = window.location.pathname.split('/');
    if (pathParts.length >= 4 && !isNaN(pathParts[3])) {
        userSpaceId = parseInt(pathParts[3]);
    }

    // 쿼리 파라미터에서도 확인
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('userSpaceId')) {
        userSpaceId = parseInt(urlParams.get('userSpaceId'));
    }

    if (!userSpaceId) {
        alert("UserSpace ID가 필요합니다.");
        goBack();
        return;
    }

    // 인증 설정
    setupAuth();

    // 폼 제출 이벤트
    $('#createForm').on('submit', function(e) {
        e.preventDefault();
        createHandover();
    });

    // 역할 입력 시 제목 자동 업데이트
    $('#role').on('input', function() {
        const role = $(this).val();
        const titleInput = $('#title');
        if (!titleInput.data('manual')) {
            titleInput.attr('placeholder', role ? role + ' 인수인계서' : '자동 생성: [역할명] 인수인계서');
        }
    });

    // 제목 수동 입력 감지
    $('#title').on('input', function() {
        $(this).data('manual', $(this).val().length > 0);
    });
});

/**
 * 인증 토큰 설정
 */
function setupAuth() {
    let accessToken = localStorage.getItem("accessToken");
    if (accessToken) {
        $.ajaxSetup({
            beforeSend: function(xhr) {
                if (!accessToken.startsWith("Bearer ")) {
                    accessToken = "Bearer " + accessToken;
                }
                xhr.setRequestHeader("Authorization", accessToken);
            }
        });
    }
}

/**
 * ========================================
 * 폼 제출 함수
 * ========================================
 */

/**
 * 인수인계서 생성
 *
 * API를 호출하여 새 인수인계 문서를 생성하고,
 * 성공 시 편집 페이지로 이동합니다.
 */
function createHandover() {
    const role = $('#role').val().trim();
    let title = $('#title').val().trim();

    // 역할명 필수 검증
    if (!role) {
        alert("역할명을 입력해주세요.");
        $('#role').focus();
        return;
    }

    // 제목 자동 생성
    if (!title) {
        title = role + ' 인수인계서';
    }

    // 초기 모듈 데이터 (빈 배열)
    const initialData = {
        title: title,
        role: role,
        modules: []
    };

    // API 호출
    $.ajax({
        url: '/api/handover',
        method: 'POST',
        contentType: 'application/json',
        data: JSON.stringify({
            title: title,
            role: role,
            text: JSON.stringify(initialData),
            userSpaceId: userSpaceId
        }),
        success: function(data) {
            // 생성된 문서의 편집 페이지로 이동
            location.href = '/handover/edit/' + data.id;
        },
        error: function(err) {
            if (err.status === 401 || err.status === 403) {
                alert("로그인이 필요합니다.");
                location.href = "/user/login";
            } else {
                alert("인수인계서 생성에 실패했습니다: " + (err.responseText || ''));
            }
        }
    });
}

/**
 * 뒤로 가기
 */
function goBack() {
    if (document.referrer) {
        history.back();
    } else {
        location.href = '/space/list';
    }
}
</script>

</body>
</html>
