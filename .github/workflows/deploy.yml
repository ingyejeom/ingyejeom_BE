name: Spring Boot Docker CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. 깃허브 가상 서버에 최신 코드 가져오기
      - uses: actions/checkout@v3
      
      # 2. 빌드를 위한 자바 17 세팅
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      
      # 3. 깃허브 서버 내에서 Spring Boot 프로젝트 빌드
      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew clean build -x test
      
      # 4. 도커 이미지를 올리기 위해 Docker Hub 로그인
      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      # 5. 도커 이미지 생성 및 푸시 (서버 아이디/레포지토리명:최신버전)
      - name: Build and push Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/ingyejeom:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/ingyejeom:latest
      
      # 6. EC2에 SSH로 접속하여 도커 컨테이너 교체
      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 기존에 돌고 있던 도커 컨테이너 종료 및 삭제 (에러 무시)
            sudo docker stop ingyejeom || true
            sudo docker rm ingyejeom || true
            # 도커 허브에서 방금 만든 최신 이미지 다운로드
            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/ingyejeom:latest
            # 8080 포트로 새 도커 컨테이너 백그라운드 실행
            sudo docker run -d --network host \
                -v /home/ubuntu/application.yml:/application.yml \
                --name ingyejeom ${{ secrets.DOCKER_USERNAME }}/ingyejeom:latest \
                --spring.config.location=file:/application.yml
